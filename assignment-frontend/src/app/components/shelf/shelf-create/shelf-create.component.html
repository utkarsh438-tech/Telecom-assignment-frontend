<div class="container">
  <div class="page-header">
    <div>
      <div class="page-title">Create Shelf</div>
      <div class="page-subtitle">Assigning to shelf position: {{ positionId }}</div>
    </div>
    <div class="page-actions">
      <button mat-button routerLink="/devices">Back</button>
      <button mat-button routerLink="/shelves">Shelves</button>
    </div>
  </div>

  <mat-card>
    <mat-card-content>
      <form [formGroup]="shelfForm" (ngSubmit)="onSubmit()">

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Shelf Name</mat-label>
          <input matInput formControlName="name" />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Part Number</mat-label>
          <input matInput formControlName="partNumber" />
        </mat-form-field>

        <div class="form-actions">
          <button mat-button type="button" routerLink="/shelves">Cancel</button>
          <button mat-raised-button color="primary" type="submit">
            Create Shelf
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
