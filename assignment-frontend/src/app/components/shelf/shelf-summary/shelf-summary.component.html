<div class="container">
  <div class="page-header">
    <div>
      <div class="page-title">{{shelf?.shelfName}}</div> <!-- FIX -->
      <div class="page-subtitle">Shelf summary </div>
    </div>
    <div class="page-actions">
      <button mat-button routerLink="/shelves">Back</button>
      <!-- <button mat-button color="primary" [disabled]="!shelf?.deviceId" (click)="goToDevice(shelf.deviceId)">Open Device</button> FIX -->
    </div>
  </div>

  <mat-card>
    <mat-card-content>
      <div class="info-grid">
        <div class="info-item">
          <div class="info-label">Shelf Name</div>
          <div class="info-value">
            <input 
            type="text"
            [value]="shelf?.shelfName"
            (input)="onShelfFieldChange('shelfName', $event)" />
          </div> <!-- FIX -->
        </div>

        <div class="info-item">
          <div class="info-label">Part Number</div>
          <div class="info-value">
            <input type="text"
            [value]="shelf?.partNumber"
            (input)="onShelfFieldChange('partNumber', $event)" />
          </div> <!-- FIX -->
        </div>
        <div class="info-item">
          <div class="info-label">Shelf Position</div>
          <div class="info-value">{{shelf?.position ?? '—'}}</div> <!-- FIX -->
        </div>
        <div class="info-item">
          <div class="info-label">Device</div>
          <div class="info-value">{{shelf?.deviceName ?? '—'}}</div> <!-- FIX -->
        </div>
      </div>
    </mat-card-content>
    <mat-card-actions>
      <button mat-raised-button color="primary" (click)="updateShelf()">Update Shelf</button>
      <button mat-raised-button color="warn" (click)="deleteShelf()">Delete Shelf</button>
    </mat-card-actions>
  </mat-card>
</div>
