<div class="container">
  <div class="page-header">
    <div>
      <div class="page-title">Create Device</div>
      <div class="page-subtitle">Define a new device and its shelf positions</div>
    </div>
    <div class="page-actions">
      <button mat-button routerLink="/devices">Back to Devices</button>
    </div>
  </div>

  <mat-card>
    <mat-card-content>
      <form [formGroup]="deviceForm" (ngSubmit)="onSubmit()">

        <div class="form-grid">
          <div class="form-column">
            <mat-form-field appearance="outline" class="full-width">
              <mat-label>Device Name</mat-label>
              <input matInput formControlName="deviceName" />
            </mat-form-field>

            <mat-form-field appearance="outline" class="full-width">
              <mat-label>Part Number</mat-label>
              <input matInput formControlName="partNumber" />
            </mat-form-field>
          </div>

          <div class="form-column">
            <mat-form-field appearance="outline" class="full-width">
              <mat-label>Building Name</mat-label>
              <input matInput formControlName="buildingName" />
            </mat-form-field>

            <mat-form-field appearance="outline" class="full-width">
              <mat-label>Device Type</mat-label>
               <input matInput formControlName="deviceType">
            </mat-form-field>
          </div>
        </div>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Number of Shelf Positions</mat-label>
          <input matInput type="number" formControlName="numShelfPositions" />
        </mat-form-field>

        <div class="form-actions">
          <button mat-button type="button" routerLink="/devices">Cancel</button>
          <button mat-raised-button color="primary" type="submit">
            Create Device
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
