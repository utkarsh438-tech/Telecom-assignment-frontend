<!-- src/app/components/device/device-summary/device-summary.component.html -->

<div class="container">
  <div class="page-header">
    <div>
      <div class="page-title" >{{device?.deviceName}}</div> <!-- FIX: device may load async -->
      <!-- <div class="page-subtitle">Device summary and shelf positions </div> -->
    </div>
    <div class="page-actions">
      <button mat-button routerLink="/devices">Back</button>
      <button mat-button routerLink="/shelves">Shelves</button>
    </div>
  </div>

  <mat-card>
    <mat-card-content>
      <div class="info-grid">
        <div class="info-item">
          <div class="info-label">Device Name</div>
          <div class="info-value"> 
            <input 
            type="text"
            [value]="device?.deviceName"
            (input)="onDeviceFieldChange('deviceName',$event)" 
            /> <!-- FIX: make editable -->
        </div>
        </div>



        <div class="info-item">
          <div class="info-label">Device Type</div>
          <div class="info-value">
             
              <input 
                type="text"
                [value]="device?.deviceType"
                (input)="onDeviceFieldChange('deviceType',$event)" />
               <!-- FIX -->
          </div>
        </div>


        <div class="info-item">
          <div class="info-label">Part Number</div>
          <div class="info-value"> 
            <input 
              type="text"
              [value]="device?.partNumber"
              (input)="onDeviceFieldChange('partNumber',$event)" />
          </div> <!-- FIX -->
        </div>


        <div class="info-item">
          <div class="info-label">Building</div>
          <div class="info-value"> 
            <input 
              type="text"
              [value]="device?.buildingName"
              (input)="onDeviceFieldChange('buildingName',$event)" />
          </div> <!-- FIX -->
        </div>


        <div class="info-item">
          <div class="info-label">Shelf Positions</div>
          <div class="info-value">{{device?.numShelfPositions}}</div> <!-- FIX -->
        </div>
      </div>
    </mat-card-content>
    <mat-card-actions>
      <button mat-raised-button color="primary" (click)="updateDevice()">Update Device</button>
      <button mat-raised-button color="warn" (click)="deleteDevice()" >Delete Device</button>
    </mat-card-actions>
  </mat-card>

  <mat-card>
    <mat-card-title>Shelf Positions</mat-card-title>
    <mat-card-content>
      <table mat-table [dataSource]="shelfPositions" class="mat-elevation-z8 nicer-table">

    <ng-container matColumnDef="position">
      <th mat-header-cell *matHeaderCellDef> Position </th>
      <td mat-cell *matCellDef="let pos"> {{pos.positionNumber}} </td> <!-- FIX -->
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef> Status </th>
      <td mat-cell *matCellDef="let pos"> {{pos.allocated ? 'Allocated' : 'Free'}} </td> <!-- FIX -->
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef> Actions </th>
      <td mat-cell *matCellDef="let pos">
        <button *ngIf="!pos.allocated" mat-button color="primary" (click)="addShelf(pos.id)"> <!-- FIX -->
          Add Shelf
        </button>
        <button *ngIf="pos.allocated" mat-button color="accent" [disabled]="!pos.shelfId" (click)="pos.shelfId && viewShelf(pos.shelfId)"> <!-- FIX -->
          {{pos.shelfName || 'View Shelf'}} <!-- FIX -->
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </mat-card-content>
  </mat-card>
</div>
